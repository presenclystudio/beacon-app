<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Beacon</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html{background:#0C1719}
:root{--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--ink:#0C1719;--ink2:#112226;--ink3:#162E33;--line:#21434A;--bone:#ECE6D8;--dim:#7E9499;--beacon:#FFB23E;--beacon2:#FF8A3D;--social:#5BC8C0;--skip:#567075;--win:#7BD88F;--no:#E8896B;}
*{box-sizing:border-box}
body{margin:0;background:var(--ink);color:var(--bone);font-family:var(--sans);font-size:15px}
.wrap{max-width:1180px;margin:0 auto;padding:22px 22px 80px}
header{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.mark{position:relative;width:30px;height:30px;flex:none}
.mark .core{position:absolute;inset:10px;border-radius:50%;background:var(--beacon);box-shadow:0 0 14px var(--beacon)}
.mark .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,178,62,.5)}
.wordmark{font-weight:800;font-size:21px;letter-spacing:-.02em}
.wordmark span{color:var(--beacon)}
.sub{font-size:12px;color:var(--dim);margin-top:2px}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.metric .k{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600;margin-bottom:7px}
.metric .v{font-weight:700;font-size:22px;line-height:1}
.metric.accent .v{color:var(--beacon)}
.metric.teal .v{color:var(--social)}
.metric.win .v{color:var(--win)}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:12.5px;font-weight:600;color:var(--dim);background:var(--ink2);border:1px solid var(--line);border-radius:99px;padding:6px 13px;cursor:pointer}
.chip.active{color:#1a1207;background:var(--beacon);border-color:var(--beacon)}
input.search,select.pick{background:var(--ink2);border:1px solid var(--line);color:var(--bone);font-family:var(--sans);font-size:13.5px;border-radius:9px;padding:8px 12px;outline:none}
input.search{min-width:160px}
select.pick{cursor:pointer}
option{background:var(--ink2);color:var(--bone)}
.spacer{flex:1}
.activity{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin-bottom:14px}
.activity .arow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:13px}
.activity label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600}
.activity input[type=date]{background:var(--ink3);border:1px solid var(--line);color:var(--bone);font-family:var(--sans);font-size:12.5px;border-radius:8px;padding:6px 9px;outline:none}
.activity .big{font-weight:700;font-size:20px;color:var(--beacon)}
.activity .lab{font-size:12px;color:var(--dim)}
.bars{display:flex;align-items:flex-end;gap:3px;height:96px;padding-top:6px;overflow-x:auto}
.bars .col{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:16px;flex:1}
.bars .b{width:100%;max-width:26px;min-height:2px;background:linear-gradient(180deg,var(--beacon),var(--beacon2));border-radius:3px 3px 0 0}
.bars .dl{font-size:8.5px;color:var(--dim);white-space:nowrap}
.act-empty{font-size:12.5px;color:var(--dim);padding:18px 0}
.panel{background:var(--ink2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600;text-align:left;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--bone)}
.arr{font-size:11px;margin-left:6px;color:#AEC2C6}
.arr.active{color:var(--beacon)}
tbody td{padding:13px 16px;border-bottom:1px solid rgba(33,67,74,.5);vertical-align:middle}
tbody tr:hover{background:rgba(255,178,62,.04)}
.biz{font-weight:600;font-size:14px}
.biz .meta{font-size:11px;color:var(--dim);font-weight:400;margin-top:2px}
.phone{font-size:13px}
.nophone{color:var(--skip);font-size:12px}
.sig{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
.sig .led{width:8px;height:8px;border-radius:50%}
.sig.no_site .led{background:var(--beacon);box-shadow:0 0 8px var(--beacon)} .sig.no_site{color:var(--beacon)}
.sig.social_only .led{background:var(--social)} .sig.social_only{color:var(--social)}
.conf{font-size:10.5px;color:var(--dim);margin-top:3px}
.score{display:flex;align-items:center;gap:9px;justify-content:flex-end}
.score .n{font-weight:700;font-size:13px;width:22px;text-align:right}
.bar{width:64px;height:6px;border-radius:3px;background:var(--ink3);overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--beacon2),var(--beacon))}
.stsel{font-family:var(--sans);font-size:11px;font-weight:700;border-radius:99px;padding:5px 9px;border:1px solid var(--line);background:var(--ink3);color:var(--dim);cursor:pointer;outline:none}
.stsel.st-contacted{color:var(--social);border-color:rgba(91,200,192,.45);background:rgba(91,200,192,.08)}
.stsel.st-callback{color:var(--beacon);border-color:rgba(255,178,62,.45);background:rgba(255,178,62,.08)}
.stsel.st-not_interested{color:var(--no);border-color:rgba(232,137,107,.45);background:rgba(232,137,107,.08)}
.stsel.st-won{color:var(--win);border-color:rgba(123,216,143,.45);background:rgba(123,216,143,.1)}
.empty{padding:40px;text-align:center;color:var(--dim)}
.foot{margin-top:18px;font-size:11px;color:var(--dim);text-align:center}
.foot a{color:var(--beacon);cursor:pointer;text-decoration:none}
/* login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:30px 28px;width:340px;max-width:100%}
.card .top{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.card h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0}
.card h1 span{color:var(--beacon)}
.card p{font-size:12.5px;color:var(--dim);margin:0 0 20px}
.card label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600;margin:0 0 6px}
.card input{width:100%;background:var(--ink3);border:1px solid var(--line);color:var(--bone);font-family:var(--sans);font-size:14px;border-radius:9px;padding:10px 12px;outline:none;margin-bottom:14px}
.card input:focus{border-color:var(--beacon)}
.card button{width:100%;background:var(--beacon);color:#1a1207;font-family:var(--sans);font-weight:700;font-size:14px;border:none;border-radius:9px;padding:11px;cursor:pointer}
.card button:disabled{opacity:.6;cursor:default}
.err{font-size:12.5px;color:var(--no);min-height:16px;margin-top:10px}
@media(max-width:980px){.metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}.hide-sm{display:none}}
</style></head><body>

<div class="login" id="login" hidden>
  <div class="card">
    <div class="top"><div class="mark"><div class="ring"></div><div class="core"></div></div><h1>BE<span>A</span>CON</h1></div>
    <p>Sign in to your shared leads.</p>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username"/>
    <label>Password</label>
    <input id="pass" type="password" autocomplete="current-password"/>
    <button id="loginBtn">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" hidden>
<div class="wrap">
  <header>
    <div class="mark"><div class="ring"></div><div class="core"></div></div>
    <div><div class="wordmark">BE<span>A</span>CON</div><div class="sub">live &middot; synced across your devices</div></div>
  </header>
  <div class="filters">
    <select class="pick" id="industry"></select>
    <input class="search" id="city" list="cities" placeholder="All cities"/>
    <datalist id="cities"></datalist>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <input class="search" id="search" placeholder="Search name or category"/>
    <div class="chips" id="chips">
      <button class="chip active" data-f="all">All</button>
      <button class="chip" data-f="no_site">No website</button>
      <button class="chip" data-f="social_only">Social-only</button>
      <button class="chip" data-f="has_phone">Has phone</button>
    </div>
    <button class="chip" id="actToggle">Activity</button>
  </div>
  <div class="activity" id="activity" hidden>
    <div class="arow">
      <label>From</label><input type="date" id="afrom"/>
      <label>To</label><input type="date" id="ato"/>
      <span class="big" id="actCount">0</span><span class="lab">companies contacted in range</span>
    </div>
    <div id="actBody"></div>
  </div>
  <div class="panel">
    <table>
      <thead><tr>
        <th data-sort="name">Business <span class="arr">&#8597;</span></th>
        <th data-sort="signal">Signal <span class="arr">&#8597;</span></th>
        <th class="hide-sm" data-sort="phone">Phone <span class="arr">&#8597;</span></th>
        <th data-sort="score" style="text-align:right">Score <span class="arr active">&#9660;</span></th>
        <th data-sort="status">Status <span class="arr">&#8597;</span></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="foot">Live from your shared database &mdash; changes sync across devices. Double-click a row to look it up. &middot; <a id="logout">Sign out</a></div>
</div>
</div>

<script>
var SUPA_URL = "https://suycxjyzutnbnfqqkotx.supabase.co";
var SUPA_KEY = "sb_publishable_pUI6fSVXePHAGu96H4yioQ_Ym3n5vsm";
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);
var LEADS = [];

/* ---- industry bucketing ---- */
var OVR={'home_automation':'Home & Trades','retirement_home':'Other','town_hall':'Other','townhall':'Other','coworking_space':'Other','venue_and_event_space':'Other','parking_space':'Other','courier_and_delivery_services':'Other','florist':'Other','furniture_reupholstery':'Home & Trades','dry_cleaning':'Home & Trades','bartender':'Other','bartending_school':'Other','jewelry':'Other','jewelry_store':'Other','jewelry_and_watches_manufacturer':'Other','sunglasses_store':'Other','tailor':'Other','gents_tailor':'Other','tattoo':'Salons & Beauty','tattoo_and_piercing':'Salons & Beauty','surgical_appliances_and_supplies':'Health & Dental','cosmetic_dentist':'Health & Dental','window_tinting':'Auto','car_window_tinting':'Auto','auto_glass_service':'Auto','butcher':'Food & Drink','butcher_shop':'Food & Drink','internet_cafe':'Food & Drink','deli':'Food & Drink'};
var RULES=[
 ['Food & Drink',['_bar','restaurant','cafe','coffee','bakery','brewery','brew','delicatessen','food','pizza','taco','sushi','burger','noodle','soup','salad','ice_cream','smoothie','juice','buffet','cafeteria','grill','cheesesteak','hot_dog','vegan','vegetarian','milk_bar']],
 ['Salons & Beauty',['barber','beauty','hair','nail','salon','spa','tanning','spray_tan','massage','lash','brow','wax','makeup','esthet','skincare']],
 ['Auto',['auto','automobile','car_','tire','tyre','brake','transmission','towing','vehicle','motor']],
 ['Health & Dental',['dentist','dental','dentistry','clinic','pediatric','chiro','optic','optom','eyewear','eye_care','physical_therapy','urgent_care','surg','womens_health','physician','medical']],
 ['Fitness',['gym','fitness','yoga','pilates','gymnastics','sports_and_fitness','martial','crossfit']],
 ['Home & Trades',['carpet','floor','fence','gutter','roof','paint','plumb','electric','hvac','contractor','landscap','paving','road_contractor','waterproof','glass','locksmith','key_and','pest','appliance','window','cleaning','pool','hot_tub','upholstery','blind','tile','mason','concrete','weld']],
 ['Pets',['pet','veterinar','aquatic','kennel','animal']]
];
var INDUSTRIES=['Food & Drink','Salons & Beauty','Auto','Health & Dental','Fitness','Home & Trades','Pets','Other'];
function bucketOf(cat){ cat=String(cat||''); if(OVR[cat])return OVR[cat]; if(cat==='bar')return 'Food & Drink';
  for(var i=0;i<RULES.length;i++){ var ks=RULES[i][1]; for(var j=0;j<ks.length;j++){ if(cat.indexOf(ks[j])>=0) return RULES[i][0]; } } return 'Other'; }
function cityNorm(c){ c=String(c==null?'':c).trim(); if(!c)return '';
  return c.split(' ').map(function(w){ return w?w.charAt(0).toUpperCase()+w.slice(1).toLowerCase():w; }).join(' '); }
function todayStr(){ var d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function daysAgo(n){ var d=new Date(Date.now()-n*86400000); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }

var filter='all', search='', industry='all', cityF='', sortCol='score', sortDir='desc';
function fmtConf(c){ return (c===null||c===undefined)?'\u2014':Number(c).toFixed(2); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
var STLABEL={'new':'New','contacted':'Contacted','callback':'Call back','not_interested':'Not interested','won':'Won'};
var STRANK={'new':0,'contacted':1,'callback':2,'not_interested':3,'won':4};

function visible(){
  var q=search.toLowerCase();
  return LEADS.filter(function(l){
    if(filter==='no_site' && l.web_signal!=='no_site') return false;
    if(filter==='social_only' && l.web_signal!=='social_only') return false;
    if(filter==='has_phone' && !l.phone) return false;
    if(industry!=='all' && bucketOf(l.category)!==industry) return false;
    if(cityF && cityNorm(l.city).toLowerCase().indexOf(cityF)<0) return false;
    if(q && (String(l.name||'')+' '+String(l.category||'')).toLowerCase().indexOf(q)<0) return false;
    return true;
  }).sort(function(a,b){
    var dir = sortDir==='asc' ? 1 : -1;
    if(sortCol==='name') return dir*String(a.name||'').localeCompare(String(b.name||''));
    if(sortCol==='signal'){ var rs={'no_site':0,'social_only':1}; return dir*((rs[a.web_signal]||0)-(rs[b.web_signal]||0)); }
    if(sortCol==='phone') return dir*(((a.phone?0:1))-((b.phone?0:1)));
    if(sortCol==='status') return dir*((STRANK[a.status||'new']||0)-(STRANK[b.status||'new']||0));
    return dir*((a.score||0)-(b.score||0));
  });
}
function metrics(rows){
  var t=rows.length, ns=0, so=0, ph=0, ct=0, wn=0;
  rows.forEach(function(l){
    if(l.web_signal==='no_site')ns++;
    if(l.web_signal==='social_only')so++;
    if(l.phone)ph++;
    var st=l.status||'new'; if(st!=='new')ct++; if(st==='won')wn++;
  });
  var cards=[['Leads',t,''],['No website',ns,'accent'],['Social-only',so,''],['Have phone',ph,''],['Contacted',ct,'teal'],['Won',wn,'win']];
  document.getElementById('metrics').innerHTML=cards.map(function(c){
    return '<div class="metric '+c[2]+'"><div class="k">'+c[0]+'</div><div class="v">'+c[1].toLocaleString()+'</div></div>';
  }).join('');
}
function arrows(){
  document.querySelectorAll('thead th').forEach(function(th){
    var a=th.querySelector('.arr'), col=th.dataset.sort; if(!a)return;
    if(col===sortCol){ a.textContent = sortDir==='asc'?'\u25B2':'\u25BC'; a.classList.add('active'); }
    else { a.textContent='\u2195'; a.classList.remove('active'); }
  });
}
function renderActivity(rows){
  var from=document.getElementById('afrom').value, to=document.getElementById('ato').value;
  var map={}, cnt=0;
  rows.forEach(function(l){
    if(l.contactedAt && l.contactedAt>=from && l.contactedAt<=to){ map[l.contactedAt]=(map[l.contactedAt]||0)+1; cnt++; }
  });
  document.getElementById('actCount').textContent=cnt.toLocaleString();
  var days=Object.keys(map).sort();
  var body=document.getElementById('actBody');
  if(!days.length){ body.innerHTML='<div class="act-empty">No activity logged in this range yet. As you move leads off &ldquo;New,&rdquo; the date is stamped and shows up here.</div>'; return; }
  var max=1; days.forEach(function(d){ if(map[d]>max)max=map[d]; });
  body.innerHTML='<div class="bars">'+days.map(function(d){
    var h=Math.round(map[d]/max*88)+4;
    return '<div class="col"><div class="b" style="height:'+h+'px" title="'+d+': '+map[d]+'"></div><div class="dl">'+d.slice(5)+'</div></div>';
  }).join('')+'</div>';
}
function render(){
  var rows=visible();
  metrics(rows); arrows();
  if(!document.getElementById('activity').hidden) renderActivity(rows);
  var tb=document.getElementById('tbody');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="5"><div class="empty">No leads match these filters.</div></td></tr>'; return; }
  tb.innerHTML=rows.map(function(l){
    var sigLabel=l.web_signal==='no_site'?'No website':'Social-only';
    var st=l.status||'new';
    var phone=l.phone?'<span class="phone">'+esc(l.phone)+'</span>':'<span class="nophone">no phone</span>';
    var cty=cityNorm(l.city);
    var opts=Object.keys(STLABEL).map(function(k){ return '<option value="'+k+'"'+(k===st?' selected':'')+'>'+STLABEL[k]+'</option>'; }).join('');
    return '<tr data-k="'+esc(l.dedupe_key)+'" data-q="'+esc(String(l.name||'')+' '+cty)+'">'
      +'<td><div class="biz">'+esc(l.name)+'<div class="meta">'+esc(l.category)+(cty?' \u00b7 '+esc(cty):'')+'</div></div></td>'
      +'<td><div class="sig '+l.web_signal+'"><span class="led"></span>'+sigLabel+'</div><div class="conf">conf '+fmtConf(l.confidence)+'</div></td>'
      +'<td class="hide-sm">'+phone+'</td>'
      +'<td><div class="score"><span class="n">'+l.score+'</span><span class="bar"><i style="width:'+l.score+'%"></i></span></div></td>'
      +'<td><select class="stsel st-'+(st==='new'?'':st)+'" data-k="'+esc(l.dedupe_key)+'">'+opts+'</select></td>'
    +'</tr>';
  }).join('');
}

/* ---- Supabase data layer ---- */
async function loadLeads(){
  var all=[], from=0, size=1000;
  while(true){
    var r = await sb.from('businesses')
      .select('dedupe_key,name,category,phone,city,web_signal,confidence,sources,score,status,contacted_at')
      .in('web_signal',['no_site','social_only'])
      .order('score',{ascending:false})
      .range(from, from+size-1);
    if(r.error) throw r.error;
    all=all.concat(r.data);
    if(!r.data || r.data.length<size) break;
    from+=size;
  }
  return all;
}
async function persistStatus(key, status, contactedAt){
  try{
    var r = await sb.from('businesses').update({status:status, contacted_at:contactedAt}).eq('dedupe_key', key);
    if(r.error) console.error('Could not save status:', r.error.message);
  }catch(e){ console.error('Could not save status:', e); }
}
async function loadAndRender(){
  var tb=document.getElementById('tbody');
  tb.innerHTML='<tr><td colspan="5"><div class="empty">Loading your leads&hellip;</div></td></tr>';
  try{
    var data=await loadLeads();
    data.forEach(function(l){ l.contactedAt = l.contacted_at || null; });
    LEADS=data;
    var seen={}, list=[];
    LEADS.forEach(function(l){ var c=cityNorm(l.city); if(c&&!seen[c]){seen[c]=1;list.push(c);} });
    list.sort();
    document.getElementById('cities').innerHTML=list.map(function(c){return '<option value="'+esc(c)+'"></option>';}).join('');
    render();
  }catch(e){
    tb.innerHTML='<tr><td colspan="5"><div class="empty">Couldn&rsquo;t load leads: '+esc(e.message||String(e))+'</div></td></tr>';
  }
}

/* ---- pickers + dates (static, run once) ---- */
(function(){
  document.getElementById('industry').innerHTML='<option value="all">All industries</option>'+INDUSTRIES.map(function(b){return '<option value="'+b+'">'+b+'</option>';}).join('');
  document.getElementById('afrom').value=daysAgo(29);
  document.getElementById('ato').value=todayStr();
})();

/* ---- events ---- */
document.getElementById('chips').addEventListener('click',function(e){
  var c=e.target.closest('.chip'); if(!c)return;
  filter=c.dataset.f;
  document.querySelectorAll('#chips .chip').forEach(function(x){x.classList.toggle('active',x===c);});
  render();
});
document.getElementById('industry').addEventListener('change',function(e){ industry=e.target.value; render(); });
document.getElementById('city').addEventListener('input',function(e){ cityF=e.target.value.trim().toLowerCase(); render(); });
document.getElementById('search').addEventListener('input',function(e){ search=e.target.value; render(); });
document.getElementById('actToggle').addEventListener('click',function(e){
  var p=document.getElementById('activity'); p.hidden=!p.hidden;
  e.target.classList.toggle('active',!p.hidden);
  if(!p.hidden) render();
});
document.getElementById('afrom').addEventListener('change',function(){ render(); });
document.getElementById('ato').addEventListener('change',function(){ render(); });
document.querySelector('thead').addEventListener('click',function(e){
  var th=e.target.closest('th'); if(!th||!th.dataset.sort)return;
  var col=th.dataset.sort;
  if(col===sortCol){ sortDir = sortDir==='asc'?'desc':'asc'; }
  else { sortCol=col; sortDir=(col==='score')?'desc':'asc'; }
  render();
});
document.getElementById('tbody').addEventListener('change',function(e){
  var sel=e.target.closest('.stsel'); if(!sel)return;
  var key=sel.dataset.k, val=sel.value, l=LEADS.find(function(x){return x.dedupe_key===key;}); if(!l)return;
  l.status=val;
  if(val==='new'){ l.contactedAt=null; }
  else if(!l.contactedAt){ l.contactedAt=todayStr(); }
  render();
  persistStatus(key, val, l.contactedAt);
});
document.getElementById('tbody').addEventListener('dblclick',function(e){
  if(e.target.closest('.stsel'))return;
  var tr=e.target.closest('tr'); if(!tr||!tr.dataset.q)return;
  window.open('https://www.google.com/search?q='+encodeURIComponent(tr.dataset.q),'_blank');
});

/* ---- auth ---- */
function showApp(){
  var lg=document.getElementById('login'); lg.hidden=true; lg.style.display='none';
  var ap=document.getElementById('app'); ap.hidden=false; ap.style.display='';
}
function showLogin(){
  var ap=document.getElementById('app'); ap.hidden=true; ap.style.display='none';
  var lg=document.getElementById('login'); lg.hidden=false; lg.style.display='flex';
}
async function doLogin(){
  var email=(document.getElementById('email').value||'').trim();
  var pass=(document.getElementById('pass').value||'').trim();
  var err=document.getElementById('loginErr');
  var btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Signing in\u2026';
  if(!email || !pass){
    err.style.color='#c0392b';
    err.textContent='Please type both an email and a password.';
    btn.disabled=false; btn.textContent='Sign in'; return;
  }
  err.style.color='#5b6b6e';
  err.textContent='Trying to sign in as '+email+' \u2026';
  try{
    var r=await sb.auth.signInWithPassword({email:email, password:pass});
    if(r.error){
      err.style.color='#c0392b';
      err.textContent='Could not sign in: '+r.error.message+'  (tried: '+email+')';
    } else {
      err.style.color='#1f7a4d';
      err.textContent='Signed in \u2713 loading leads\u2026';
      showApp();
      try{ await loadAndRender(); }
      catch(le){ err.style.color='#c0392b'; err.textContent='Signed in, but loading leads failed: '+String(le.message||le); }
    }
  }catch(e){ err.style.color='#c0392b'; err.textContent='Error: '+String(e.message||e); }
  btn.disabled=false; btn.textContent='Sign in';
}
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('email').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('logout').addEventListener('click', async function(){ await sb.auth.signOut(); LEADS=[]; showLogin(); });

(async function(){
  try{
    var s=await sb.auth.getSession();
    if(s.data && s.data.session){ showApp(); loadAndRender(); return; }
  }catch(e){}
  showLogin();
})();
</script>
</body></html>
